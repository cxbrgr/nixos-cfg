services:
  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
      - "18790:18790"
    stdin_open: true
    tty: true
    volumes:
      - /data/docker/openclaw:/home/node/.openclaw
      - /data/docker/openclaw/workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true      
      - TZ=Europe/Vienna
    command: ["gateway"]

  socat-proxy:
    image: alpine/socat
    container_name: openclaw-socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

  openclaw-cli:
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-cli
    volumes:
      - /data/docker/openclaw:/home/node/.openclaw
      - /data/docker/openclaw/workspace:/home/node/.openclaw/workspace
    profiles:
      - cli
    stdin_open: true
    tty: true
